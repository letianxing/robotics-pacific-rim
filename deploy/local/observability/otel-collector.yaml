receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  resource/platform:
    attributes:
      - key: service.namespace
        value: pacific-rim
        action: upsert
      - key: deployment.environment.name
        value: local
        action: upsert
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: detailed
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
  otlphttp/tempo:
    endpoint: http://tempo:4318
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
  prometheus:
    endpoint: 0.0.0.0:9464
    resource_to_telemetry_conversion:
      enabled: true

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/platform, batch]
      exporters: [otlphttp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/platform, batch]
      exporters: [debug, prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/platform, batch]
      exporters: [otlphttp/loki, debug]
