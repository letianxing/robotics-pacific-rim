service:
  name: "middleware_sub_test_service"
  runtime_package: "middleware_sub_test"

trace:
  service_name: "middleware_sub_test_service"

communication:
  security:
    require_explicit_profile: false
    profiles:
      default:
        enabled: false
        algorithm: aes-256-gcm
        key_id: middleware_sub_test-dev-v1
        key_env: PR_COMM_SECURITY_MIDDLEWARE_SUB_TEST_KEY
        salt_env: PR_COMM_SECURITY_MIDDLEWARE_SUB_TEST_SALT
        aad_context: pacific-rim.middleware_sub_test_service
        replay_window: 4096
        fail_open: false
  middleware:
    nats:
      name: test-nats
      server_url: nats://127.0.0.1:4222
    cyclonedds:
      name: test-dds
      domain_id: 0
      config_uri: file:///etc/cyclonedds/cyclonedds.xml
  services: {}
  topics:
    robot_state:
      topic_ref: middleware_pub_test_service.robot_state
      direction: subscribe
      middlewares:
        - nats
        - cyclonedds
